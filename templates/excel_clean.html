<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel数据清洗 - 企业文档自动化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }
        input[type="file"] {
            display: none;
        }
        .upload-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .upload-btn:hover {
            background: #5568d3;
            transform: scale(1.05);
        }
        .options {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .options h3 {
            margin-bottom: 15px;
            color: #333;
        }
        .option-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .option-item input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .file-info {
            margin-top: 15px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 8px;
            display: none;
        }
        .file-info.show {
            display: block;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .tips {
            margin-top: 30px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .tips h3 {
            color: #2e7d32;
            margin-bottom: 10px;
        }
        .tips ul {
            margin-left: 20px;
        }
        .tips li {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 返回首页</a>
        
        <h1>🧹 Excel数据清洗</h1>
        <p class="subtitle">智能清洗Excel数据：去重、删除空行、统一格式</p>

        <form id="uploadForm">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📊</div>
                <p style="margin-bottom: 15px;">点击或拖拽上传Excel文件</p>
                <label class="upload-btn">
                    选择文件
                    <input type="file" id="fileInput" accept=".xlsx,.xls" required>
                </label>
                <div class="file-info" id="fileInfo"></div>
            </div>

            <div class="options">
                <h3>清洗选项</h3>
                <div class="option-item">
                    <input type="checkbox" id="removeDup" checked>
                    <label for="removeDup">去除重复行</label>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="removeEmpty" checked>
                    <label for="removeEmpty">删除空值过多的行</label>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="standardizeDate" checked>
                    <label for="standardizeDate">标准化日期格式 (YYYY-MM-DD)</label>
                </div>
                <div class="option-item">
                    <input type="checkbox" id="standardizePhone" checked>
                    <label for="standardizePhone">标准化电话号码格式（只保留数字）</label>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn" disabled>开始清洗</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在清洗数据，请稍候...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="tips">
            <h3>💡 清洗说明</h3>
            <ul>
                <li><strong>去重：</strong>删除完全相同的行，保留第一次出现的行</li>
                <li><strong>删除空行：</strong>删除超过50%字段为空的行</li>
                <li><strong>日期标准化：</strong>自动识别日期列并转换为 YYYY-MM-DD 格式</li>
                <li><strong>电话标准化：</strong>自动识别电话列并移除所有非数字字符</li>
                <li>清洗报告会保存在Excel的第二个工作表中</li>
            </ul>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const uploadArea = document.getElementById('uploadArea');

        fileInput.addEventListener('change', function() {
            if (this.files[0]) {
                const file = this.files[0];
                const size = (file.size / 1024 / 1024).toFixed(2);
                fileInfo.innerHTML = `✅ 已选择: <strong>${file.name}</strong> (${size} MB)`;
                fileInfo.classList.add('show');
                submitBtn.disabled = false;
            }
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#667eea';
            uploadArea.style.background = '#f8f9ff';
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ddd';
            uploadArea.style.background = 'white';
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ddd';
            uploadArea.style.background = 'white';
            
            const files = e.dataTransfer.files;
            if (files.length > 0 && files[0].name.match(/\.(xlsx|xls)$/i)) {
                fileInput.files = files;
                fileInput.dispatchEvent(new Event('change'));
            } else {
                showError('请上传Excel文件（.xlsx或.xls）');
            }
        });

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) {
                showError('请选择文件');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('remove_dup', document.getElementById('removeDup').checked);
            formData.append('remove_empty', document.getElementById('removeEmpty').checked);
            formData.append('standardize_date', document.getElementById('standardizeDate').checked);
            formData.append('standardize_phone', document.getElementById('standardizePhone').checked);

            submitBtn.disabled = true;
            loading.classList.add('show');
            error.classList.remove('show');

            try {
                const response = await fetch('/excel-clean', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = file.name.replace(/\.(xlsx|xls)$/i, '_cleaned.xlsx');
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    
                    loading.innerHTML = '<p style="color: #4caf50;">✅ 清洗完成，文件已下载！</p>';
                } else {
                    const data = await response.json();
                    showError(data.error || '处理失败，请重试');
                }
            } catch (err) {
                showError('网络错误，请重试');
            } finally {
                setTimeout(() => {
                    loading.classList.remove('show');
                    loading.innerHTML = '<div class="spinner"></div><p>正在清洗数据，请稍候...</p>';
                    submitBtn.disabled = false;
                }, 3000);
            }
        });

        function showError(msg) {
            error.textContent = '❌ ' + msg;
            error.classList.add('show');
        }
    </script>
</body>
</html>
